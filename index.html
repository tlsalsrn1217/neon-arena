<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON ARENA — 멀티플레이 탑뷰 슈터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=IBM+Plex+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{
  --bg:#07090F; --panel:#0E1320; --line:#1D2740;
  --cyan:#3EF2E4; --mag:#FF4FA3; --amber:#FFC24B; --text:#DCE6F5; --dim:#6B7A99;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans KR',sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center;touch-action:none;overscroll-behavior:none}
#wrap{position:relative}
canvas{display:block;background:#0A0E1A;border:1px solid var(--line);box-shadow:0 0 60px rgba(62,242,228,.06);touch-action:none}
/* ---------- 로비 ---------- */
#lobby{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(7,9,15,.92);backdrop-filter:blur(6px);z-index:10}
.card{width:400px;max-width:88vw;background:var(--panel);border:1px solid var(--line);padding:36px 28px;text-align:center}
.logo{font-family:'Orbitron';font-weight:900;font-size:30px;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 24px rgba(62,242,228,.5)}
.logo span{color:var(--mag);text-shadow:0 0 24px rgba(255,79,163,.5)}
.sub{color:var(--dim);font-size:12px;margin:6px 0 26px;letter-spacing:2px}
input{width:100%;padding:12px 14px;background:#0A0E1A;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:15px;margin-bottom:10px;outline:none;text-align:center}
input:focus{border-color:var(--cyan)}
button{width:100%;padding:13px;border:none;cursor:pointer;font-family:'Orbitron';font-weight:700;font-size:14px;letter-spacing:2px;margin-top:6px;transition:.15s}
.btn-host{background:var(--cyan);color:#06231F}
.btn-host:hover{box-shadow:0 0 20px rgba(62,242,228,.5)}
.btn-join{background:transparent;color:var(--mag);border:1px solid var(--mag)}
.btn-join:hover{background:rgba(255,79,163,.1)}
#joinRow{display:none;margin-top:10px}
#roomCodeInput{text-transform:uppercase;font-family:'Orbitron';letter-spacing:6px;font-size:20px}
#status{margin-top:14px;font-size:12px;color:var(--amber);min-height:16px}
/* ---------- 인게임 HUD ---------- */
#hud{position:absolute;top:10px;left:10px;right:10px;display:none;justify-content:space-between;pointer-events:none;z-index:5}
#roomTag{font-family:'Orbitron';font-size:12px;letter-spacing:2px;color:var(--dim);background:rgba(14,19,32,.8);border:1px solid var(--line);padding:6px 12px}
#roomTag b{color:var(--cyan)}
#board{background:rgba(14,19,32,.8);border:1px solid var(--line);padding:6px 12px;font-size:12px;min-width:150px}
#board .row{display:flex;justify-content:space-between;gap:14px;padding:2px 0}
#feed{position:absolute;bottom:12px;left:12px;font-size:12px;color:var(--dim);z-index:5;pointer-events:none}
#feed div{margin-top:3px;text-shadow:0 0 8px rgba(0,0,0,.8)}
#help{position:absolute;bottom:12px;right:12px;font-size:11px;color:var(--dim);z-index:5;pointer-events:none;display:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="600"></canvas>

  <div id="hud">
    <div id="roomTag">ROOM <b id="roomTagCode">----</b></div>
    <div id="board"></div>
  </div>
  <div id="feed"></div>
  <div id="help">이동 WASD · 조준 마우스 · 발사 클릭</div>

  <div id="lobby">
    <div class="card">
      <div class="logo">NEON<span>ARENA</span></div>
      <div class="sub">TOP-DOWN MULTIPLAYER SHOOTER</div>
      <input id="nameInput" maxlength="8" placeholder="닉네임 (최대 8자)">
      <button class="btn-host" id="hostBtn">방 만들기</button>
      <button class="btn-join" id="joinToggleBtn">코드로 참가</button>
      <div id="joinRow">
        <input id="roomCodeInput" maxlength="4" placeholder="CODE">
        <button class="btn-join" id="joinBtn">입장</button>
      </div>
      <div id="status"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   NEON ARENA — P2P 멀티플레이 탑뷰 슈터
   호스트 권위(host-authoritative) 구조:
   - 호스트가 시뮬레이션 실행 후 상태를 브로드캐스트
   - 클라이언트는 입력만 전송하고 스냅샷을 렌더링
   ========================================================= */
const W = 960, H = 600;
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const PREFIX = 'neon-arena-v1-';
const COLORS = ['#3EF2E4','#FF4FA3','#FFC24B','#7B6CFF','#5DFF8A','#FF6B4A'];
const SPEED = 230, BULLET_SPEED = 780, FIRE_CD = 0.3, DMG = 25, RESPAWN = 2.2;
const MID = W/2, MAX_BOUNCE = 3, BULLET_LIFE = 2.4;

const OBSTACLES = [
  {x:180,y:140,w:120,h:26},{x:660,y:140,w:120,h:26},
  {x:180,y:434,w:120,h:26},{x:660,y:434,w:120,h:26},
  {x:454,y:230,w:52,h:140},{x:80,y:274,w:90,h:26},{x:790,y:274,w:90,h:26}
];

let peer=null, isHost=false, myId=null, roomCode='';
let conns={};            // 호스트: peerId -> DataConnection
let hostConn=null;       // 클라이언트: 호스트 연결
let state={players:{},bullets:[]};
let feed=[];
let input={mx:0,my:0,shoot:0,aim:0};
let shake=0, particles=[];
let myName='PILOT';

/* 화면 크기에 맞춰 캔버스 스케일 (비율 유지) */
function fitScreen(){
  const s=Math.min(innerWidth/W, innerHeight/H);
  cv.style.width=Math.floor(W*s)+'px';
  cv.style.height=Math.floor(H*s)+'px';
}
addEventListener('resize',fitScreen);
addEventListener('orientationchange',()=>setTimeout(fitScreen,300));
fitScreen();

const $=id=>document.getElementById(id);
const statusEl=$('status');

/* ---------- 로비 ---------- */
$('joinToggleBtn').onclick=()=>{$('joinRow').style.display='block';$('roomCodeInput').focus();};

$('hostBtn').onclick=()=>{
  myName=($('nameInput').value.trim()||'PILOT').slice(0,8);
  roomCode=Array.from({length:4},()=> 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*31)]).join('');
  statusEl.textContent='방 생성 중...';
  peer=new Peer(PREFIX+roomCode);
  peer.on('open',()=>{
    isHost=true; myId='host';
    addPlayer(myId,myName);
    startGame();
    peer.on('connection',c=>setupHostConn(c));
  });
  peer.on('error',e=>{statusEl.textContent='연결 오류: '+e.type+' (새로고침 후 재시도)';});
};

$('joinBtn').onclick=joinRoom;
$('roomCodeInput').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});

function joinRoom(){
  myName=($('nameInput').value.trim()||'PILOT').slice(0,8);
  const code=$('roomCodeInput').value.trim().toUpperCase();
  if(code.length!==4){statusEl.textContent='4자리 코드를 입력하세요';return;}
  roomCode=code;
  statusEl.textContent='접속 중...';
  peer=new Peer();
  peer.on('open',id=>{
    myId=id;
    hostConn=peer.connect(PREFIX+code,{reliable:true});
    hostConn.on('open',()=>{
      hostConn.send({t:'join',name:myName});
      startGame();
    });
    hostConn.on('data',onClientData);
    hostConn.on('close',()=>{statusEl.textContent='호스트 연결 종료';location.reload();});
  });
  peer.on('error',e=>{
    statusEl.textContent = e.type==='peer-unavailable' ? '방을 찾을 수 없습니다' : '오류: '+e.type;
  });
}

function startGame(){
  $('lobby').style.display='none';
  $('hud').style.display='flex';
  $('help').style.display='block';
  $('help').textContent = ('ontouchstart' in window)
    ? '왼쪽 화면 드래그 = 이동 · 오른쪽 화면 드래그 = 조준+발사'
    : '이동 WASD · 조준 마우스 · 발사 클릭';
  if('ontouchstart' in window) setTimeout(()=>{$('help').style.display='none';},5000);
  $('roomTagCode').textContent=roomCode;
  requestAnimationFrame(loop);
}

/* ---------- 호스트: 접속 처리 ---------- */
function setupHostConn(c){
  c.on('open',()=>{});
  c.on('data',m=>{
    if(m.t==='join'){
      conns[c.peer]=c;
      addPlayer(c.peer,m.name);
      pushFeed(`${m.name} 님이 입장했습니다`);
      c.send({t:'welcome',id:c.peer});
    } else if(m.t==='input'){
      const p=state.players[c.peer];
      if(p) p.input=m.i;
    }
  });
  c.on('close',()=>{
    const p=state.players[c.peer];
    if(p) pushFeed(`${p.name} 님이 퇴장했습니다`);
    delete state.players[c.peer];
    delete conns[c.peer];
  });
}

function spawnPos(side){
  return side===0
    ? {x:60+Math.random()*(MID-160), y:100+Math.random()*(H-200)}
    : {x:MID+100+Math.random()*(MID-160), y:100+Math.random()*(H-200)};
}

function addPlayer(id,name){
  const idx=Object.keys(state.players).length;
  const side=idx%2;                     // 입장 순서대로 좌/우 교대 배정
  const sp=spawnPos(side);
  state.players[id]={
    id,name,side,color:COLORS[idx%COLORS.length],
    x:sp.x, y:sp.y,
    hp:100, score:0, dead:0, aim:0, cd:0, hitFlash:0,
    input:{mx:0,my:0,shoot:0,aim:0}
  };
}

function pushFeed(txt){
  feed.push({txt,t:6});
  if(isHost) broadcast({t:'feed',txt});
}

function broadcast(msg){
  for(const k in conns){ try{conns[k].send(msg);}catch(e){} }
}

/* ---------- 클라이언트: 수신 ---------- */
function onClientData(m){
  if(m.t==='state'){ state=m.s; }
  else if(m.t==='feed'){ feed.push({txt:m.txt,t:6}); }
  else if(m.t==='shake'){ if(m.id===myId) shake=Math.max(shake,m.v); }
}

/* ---------- 입력 ---------- */
const keys={};
addEventListener('keydown',e=>{keys[e.code]=1;});
addEventListener('keyup',e=>{keys[e.code]=0;});
let mouse={x:W/2,y:H/2,down:0};
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width);
  mouse.y=(e.clientY-r.top)*(H/r.height);
});
cv.addEventListener('mousedown',()=>mouse.down=1);
addEventListener('mouseup',()=>mouse.down=0);

/* 터치: 왼쪽 = 이동 스틱, 오른쪽 = 조준+발사 스틱 */
let touchMode=false;
const STICK_R=52;
const stickL={active:false,tid:null,bx:0,by:0,dx:0,dy:0};
const stickR={active:false,tid:null,bx:0,by:0,dx:0,dy:0,len:0};
function tpos(t){
  const r=cv.getBoundingClientRect();
  return {x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height)};
}
cv.addEventListener('touchstart',e=>{
  e.preventDefault(); touchMode=true;
  for(const t of e.changedTouches){
    const p=tpos(t);
    if(p.x<W/2 && !stickL.active) Object.assign(stickL,{active:true,tid:t.identifier,bx:p.x,by:p.y,dx:0,dy:0});
    else if(p.x>=W/2 && !stickR.active) Object.assign(stickR,{active:true,tid:t.identifier,bx:p.x,by:p.y,dx:0,dy:0,len:0});
  }
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const p=tpos(t);
    for(const s of [stickL,stickR]){
      if(s.active && s.tid===t.identifier){
        let dx=(p.x-s.bx)/STICK_R, dy=(p.y-s.by)/STICK_R;
        const l=Math.hypot(dx,dy);
        s.len=Math.min(l,1);
        if(l>1){dx/=l; dy/=l;}
        s.dx=dx; s.dy=dy;
      }
    }
  }
},{passive:false});
function endTouch(e){
  e.preventDefault();
  for(const t of e.changedTouches)
    for(const s of [stickL,stickR])
      if(s.active && s.tid===t.identifier) Object.assign(s,{active:false,dx:0,dy:0,len:0});
}
cv.addEventListener('touchend',endTouch,{passive:false});
cv.addEventListener('touchcancel',endTouch,{passive:false});

function readInput(){
  const me=state.players[myId];
  let mx=((keys['KeyD']||keys['ArrowRight'])?1:0)-((keys['KeyA']||keys['ArrowLeft'])?1:0);
  let my=((keys['KeyS']||keys['ArrowDown'])?1:0)-((keys['KeyW']||keys['ArrowUp'])?1:0);
  let aim=me?Math.atan2(mouse.y-me.y, mouse.x-me.x):0;
  let shoot=mouse.down;
  if(stickL.active){ mx=stickL.dx; my=stickL.dy; }
  if(stickR.active){
    if(stickR.len>0.25){ aim=Math.atan2(stickR.dy,stickR.dx); shoot=1; }
    else shoot=0;
  }
  input={mx,my,shoot,aim};
}

/* ---------- 시뮬레이션 (호스트 전용) ---------- */
function collideRect(x,y,r){
  if(x<r.x-14||x>r.x+r.w+14||y<r.y-14||y>r.y+r.h+14) return false;
  return true;
}
function blocked(x,y,side){
  if(x<16||x>W-16||y<16||y>H-16) return true;
  if(side===0 && x>MID-18) return true;   // 왼쪽 진영: 구분선 못 넘음
  if(side===1 && x<MID+18) return true;   // 오른쪽 진영: 구분선 못 넘음
  for(const o of OBSTACLES) if(collideRect(x,y,o)) return true;
  return false;
}
function inObs(x,y){
  for(const o of OBSTACLES) if(x>o.x&&x<o.x+o.w&&y>o.y&&y<o.y+o.h) return true;
  return false;
}

function simulate(dt){
  for(const id in state.players){
    const p=state.players[id];
    if(p.dead>0){
      p.dead-=dt;
      if(p.dead<=0){ p.hp=100; const sp=spawnPos(p.side); p.x=sp.x; p.y=sp.y; }
      continue;
    }
    const i=p.input||{};
    p.aim=i.aim||0;
    let dx=i.mx||0, dy=i.my||0;
    const mlen=Math.hypot(dx,dy);
    if(mlen>1){dx/=mlen; dy/=mlen;}
    const nx=p.x+dx*SPEED*dt, ny=p.y+dy*SPEED*dt;
    if(!blocked(nx,p.y,p.side)) p.x=nx;
    if(!blocked(p.x,ny,p.side)) p.y=ny;
    p.cd-=dt;
    p.hitFlash=Math.max(0,(p.hitFlash||0)-dt*4);
    if(i.shoot&&p.cd<=0){
      p.cd=FIRE_CD;
      state.bullets.push({x:p.x+Math.cos(p.aim)*20,y:p.y+Math.sin(p.aim)*20,
        vx:Math.cos(p.aim)*BULLET_SPEED,vy:Math.sin(p.aim)*BULLET_SPEED,o:id,c:p.color,life:BULLET_LIFE,bn:0});
    }
  }
  // 총알: 벽/장애물 반사 (구분선은 통과)
  for(let b of state.bullets){
    const px=b.x;
    b.x+=b.vx*dt;
    if(b.x<5){b.x=5;b.vx*=-1;b.bn++;}
    else if(b.x>W-5){b.x=W-5;b.vx*=-1;b.bn++;}
    else if(inObs(b.x,b.y)){b.x=px;b.vx*=-1;b.bn++;}
    const py=b.y;
    b.y+=b.vy*dt;
    if(b.y<5){b.y=5;b.vy*=-1;b.bn++;}
    else if(b.y>H-5){b.y=H-5;b.vy*=-1;b.bn++;}
    else if(inObs(b.x,b.y)){b.y=py;b.vy*=-1;b.bn++;}
    b.life-=dt;
    if(b.bn>MAX_BOUNCE) b.life=0;
    if(b.life<=0) continue;
    for(const id in state.players){
      const p=state.players[id];
      if(p.dead>0) continue;
      if(id===b.o && b.bn===0) continue;   // 반사 전에는 자기 탄에 안 맞음
      const d=(p.x-b.x)**2+(p.y-b.y)**2;
      if(d<16*16){
        b.life=0; p.hp-=DMG; p.hitFlash=1;
        broadcast({t:'shake',id,v:8});
        if(id===myId) shake=Math.max(shake,8);
        if(p.hp<=0){
          p.dead=RESPAWN;
          const killer=state.players[b.o];
          if(killer&&b.o!==id){ killer.score++; pushFeed(`${killer.name} ▶ ${p.name} 격추!${b.bn>0?' (벽반사)':''}`); }
          else if(b.o===id){ pushFeed(`${p.name} 자기 탄에 격추...`); }
        }
      }
    }
  }
  state.bullets=state.bullets.filter(b=>b.life>0);
}

/* ---------- 메인 루프 ---------- */
let last=performance.now(), netTimer=0;
function loop(now){
  const dt=Math.min((now-last)/1000,0.05); last=now;
  readInput();

  if(isHost){
    const me=state.players[myId];
    if(me) me.input=input;
    simulate(dt);
    netTimer+=dt;
    if(netTimer>1/20){ netTimer=0; broadcast({t:'state',s:state}); }
  } else if(hostConn&&hostConn.open){
    netTimer+=dt;
    if(netTimer>1/30){ netTimer=0; hostConn.send({t:'input',i:input}); }
  }

  feed.forEach(f=>f.t-=dt);
  feed=feed.filter(f=>f.t>0).slice(-5);
  shake=Math.max(0,shake-dt*40);
  render();
  requestAnimationFrame(loop);
}

/* ---------- 렌더링 ---------- */
function render(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  ctx.fillStyle='#0A0E1A'; ctx.fillRect(-20,-20,W+40,H+40);

  // 그리드
  ctx.strokeStyle='rgba(29,39,64,.5)'; ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<=W;x+=48){ctx.moveTo(x,0);ctx.lineTo(x,H);}
  for(let y=0;y<=H;y+=48){ctx.moveTo(0,y);ctx.lineTo(W,y);}
  ctx.stroke();

  // 장애물
  for(const o of OBSTACLES){
    ctx.fillStyle='#141B2E'; ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.strokeStyle='#2A3A5F'; ctx.strokeRect(o.x+.5,o.y+.5,o.w-1,o.h-1);
  }

  // 중앙 구분선 (플레이어 통행 불가 · 탄환은 통과)
  ctx.save();
  ctx.strokeStyle='rgba(255,194,75,.5)'; ctx.lineWidth=3;
  ctx.setLineDash([12,10]);
  ctx.shadowColor='#FFC24B'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.moveTo(MID,0); ctx.lineTo(MID,H); ctx.stroke();
  ctx.restore();

  // 벽반사 궤적 미리보기 (내 조준선, 최대 2회 반사)
  {
    const me=state.players[myId];
    if(me && me.dead<=0){
      let tx=me.x+Math.cos(me.aim)*20, ty=me.y+Math.sin(me.aim)*20;
      let tvx=Math.cos(me.aim), tvy=Math.sin(me.aim), tbn=0;
      ctx.strokeStyle='rgba(220,230,245,.18)'; ctx.lineWidth=1.5;
      ctx.setLineDash([4,7]);
      ctx.beginPath(); ctx.moveTo(tx,ty);
      for(let s=0; s<150 && tbn<=2; s++){
        const nx2=tx+tvx*5;
        if(nx2<5||nx2>W-5||inObs(nx2,ty)){tvx*=-1;tbn++;} else tx=nx2;
        const ny2=ty+tvy*5;
        if(ny2<5||ny2>H-5||inObs(tx,ny2)){tvy*=-1;tbn++;} else ty=ny2;
        ctx.lineTo(tx,ty);
      }
      ctx.stroke(); ctx.setLineDash([]);
    }
  }

  // 총알
  for(const b of state.bullets){
    ctx.shadowColor=b.c; ctx.shadowBlur=12;
    ctx.fillStyle=b.c;
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,7); ctx.fill();
  }
  ctx.shadowBlur=0;

  // 플레이어
  for(const id in state.players){
    const p=state.players[id];
    if(p.dead>0){
      ctx.fillStyle='rgba(107,122,153,.4)';
      ctx.font='11px Orbitron';
      ctx.textAlign='center';
      ctx.fillText(`RESPAWN ${p.dead.toFixed(1)}`,p.x,p.y);
      continue;
    }
    // 본체
    ctx.shadowColor=p.color; ctx.shadowBlur=p.hitFlash>0?30:16;
    ctx.fillStyle=p.hitFlash>0?'#FFFFFF':p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,14,0,7); ctx.fill();
    ctx.shadowBlur=0;
    // 총구
    ctx.strokeStyle=p.color; ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(p.x+Math.cos(p.aim)*10,p.y+Math.sin(p.aim)*10);
    ctx.lineTo(p.x+Math.cos(p.aim)*24,p.y+Math.sin(p.aim)*24);
    ctx.stroke();
    // 이름 + HP바
    ctx.fillStyle=id===myId?'#FFFFFF':'#9AAAC8';
    ctx.font='600 11px "IBM Plex Sans KR"'; ctx.textAlign='center';
    ctx.fillText(p.name,p.x,p.y-26);
    ctx.fillStyle='#1D2740'; ctx.fillRect(p.x-16,p.y-22,32,4);
    ctx.fillStyle=p.hp>50?'#5DFF8A':(p.hp>25?'#FFC24B':'#FF4FA3');
    ctx.fillRect(p.x-16,p.y-22,32*Math.max(0,p.hp)/100,4);
  }
  ctx.restore();

  // 가상 조이스틱
  if(touchMode){
    for(const s of [stickL,stickR]){
      if(!s.active) continue;
      ctx.strokeStyle='rgba(220,230,245,.22)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(s.bx,s.by,STICK_R,0,7); ctx.stroke();
      ctx.fillStyle = s===stickR ? 'rgba(255,79,163,.45)' : 'rgba(62,242,228,.45)';
      ctx.beginPath(); ctx.arc(s.bx+s.dx*STICK_R, s.by+s.dy*STICK_R, 18, 0, 7); ctx.fill();
    }
  }

  // 스코어보드
  const rows=Object.values(state.players).sort((a,b)=>b.score-a.score)
    .map(p=>`<div class="row"><span style="color:${p.color}">${p.name}${p.id===myId?' (나)':''}</span><b>${p.score}</b></div>`).join('');
  $('board').innerHTML=rows||'<div class="row">대기 중...</div>';
  $('feed').innerHTML=feed.map(f=>`<div>${f.txt}</div>`).join('');
}
</script>
</body>
</html>
